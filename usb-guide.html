<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U盘使用说明书</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0 20px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #e8e8e8;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .header p {
            margin: 5px 0 0;
            color: #8c8c8c;
        }
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #e8e8e8;
            cursor: pointer;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item .text {
            font-size: 16px;
        }
        .button-link {
            display: block;
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 16px;
            margin: 20px 0;
        }
        .video-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .video-modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
        }
        .video-modal-content video {
            width: 100%;
            border-radius: 8px;
        }
        .close-button {
            position: absolute;
            top: -30px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>u盘使用说明书</h1>
    </div>
    <div id="list-container">
        <!-- Items will be generated by JavaScript -->
    </div>
    <a href="http://bilibili.com/video/BV1xFNGzzErG?vd_source=fb40159e69bb1fc6aba9995623c763e5&spm_id_from=333.788.player.player_end_recommend_autoplay&trackid=web_related_0.router-related-2481894-flpjl.1773056176092.990" class="button-link" target="_blank">
        以上视频高速播放 (加载慢、卡顿点这个)
    </a>
</div>

<div id="videoModal" class="video-modal">
    <div class="video-modal-content">
        <span id="closeButton" class="close-button">&times;</span>
        <video id="videoPlayer" controls autoplay></video>
    </div>
</div>

<script>
    const items = [
        "U盘常用-问题解答",
        "U盘容量-问题解答",
        "【OPPO/VIVO】手机使用方法",
        "【华为/小米】手机使用方法",
        "【OPPO/VIVO】看了视频还是不会操作",
        "【华为/小米】看了视频还是不会操作",
        "【视频】VIVO手机-操作教程",
        "【视频】OPPO手机-操作教程",
        "【视频】小米手机-操作教程",
        "【视频】华为手机-操作教程",
        "【视频】下载音乐视频-操作教程",
        "苹果15-16-17使用教程【视频教程】"
    ];

    const listContainer = document.getElementById('list-container');

    items.forEach((item, index) => {
        const listItem = document.createElement('div');
        listItem.classList.add('list-item');
        listItem.dataset.video = `videos/${index + 1}.mp4`;
        
        const text = document.createElement('div');
        text.classList.add('text');
        
        if (item.startsWith("【视频】") || item.includes("【视频教程】")) {
             text.textContent = item;
        } else {
             text.textContent = `${index + 1}: ${item}`;
        }

        listItem.appendChild(text);
        listContainer.appendChild(listItem);

        listItem.addEventListener('click', () => {
            const videoSrc = listItem.dataset.video;
            const videoModal = document.getElementById('videoModal');
            const videoPlayer = document.getElementById('videoPlayer');
            
            videoPlayer.src = videoSrc;
            videoModal.style.display = 'flex';
        });
    });

    const videoModal = document.getElementById('videoModal');
    const closeButton = document.getElementById('closeButton');
    const videoPlayer = document.getElementById('videoPlayer');

    closeButton.addEventListener('click', () => {
        videoModal.style.display = 'none';
        videoPlayer.pause();
        videoPlayer.currentTime = 0;
    });

    videoModal.addEventListener('click', (e) => {
        if (e.target === videoModal) {
            videoModal.style.display = 'none';
            videoPlayer.pause();
            videoPlayer.currentTime = 0;
        }
    });
</script>

</body>
</html>
