<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U盘使用说明书</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 0 15px;
        }
        .header {
            text-align: center;
            padding: 18px 0;
            border-bottom: 1px solid #e8e8e8;
        }
        .header h1 {
            margin: 0;
            font-size: clamp(18px, 5vw, 24px);
        }
        .header p {
            margin: 5px 0 0;
            color: #8c8c8c;
        }
        .list-item {
            display: flex;
            align-items: center;
            padding: 14px 5px;
            border-bottom: 1px solid #e8e8e8;
            cursor: pointer;
            transition: background-color 0.15s;
        }
        .list-item:active {
            background-color: #f5f5f5;
        }
        .list-item:last-child {
            border-bottom: none;
        }
        .list-item .text {
            font-size: clamp(14px, 3.5vw, 16px);
        }
        .button-link {
            display: block;
            background-color: #007bff;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            text-decoration: none;
            font-size: clamp(14px, 3.5vw, 16px);
            margin: 15px 0;
        }
        .button-link:active {
            background-color: #0056b3;
        }

        /* 弹窗 */
        .video-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .video-modal-content {
            position: relative;
            width: 100%;
            max-width: 800px;
        }
        .video-modal-content video,
        .video-modal-content img {
            width: 100%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
            background: #000;
        }
        .video-modal-content .video-iframe {
            width: 100%;
            border: 0;
            border-radius: 8px;
            background: #000;
            max-height: 80vh;
        }
        .iframe-wrapper {
            position: relative;
            width: 100%;
            /* 自适应高度：在视口高度与宽度计算的 16:9 之间取最小值，保证不超出屏幕 */
            height: min(80vh, calc(90vw * 9 / 16));
            max-height: 92vh;
        }
        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            border-radius: 8px;
        }
        .close-button {
            position: absolute;
            top: -35px;
            right: 0;
            color: white;
            font-size: 32px;
            cursor: pointer;
            padding: 5px 10px;
            z-index: 1001;
        }

        /* 自定义进度条 */
        .video-progress-wrap {
            width: 100%;
            margin-top: 8px;
        }
        .video-progress-bar {
            position: relative;
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.25);
            border-radius: 4px;
            cursor: pointer;
            touch-action: none;
        }
        .video-progress-buffered {
            position: absolute;
            height: 100%;
            background: rgba(255,255,255,0.35);
            border-radius: 4px;
            pointer-events: none;
        }
        .video-progress-filled {
            position: absolute;
            height: 100%;
            background: #007bff;
            border-radius: 4px;
            pointer-events: none;
        }
        .video-progress-thumb {
            position: absolute;
            top: 50%;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
        .video-time {
            display: flex;
            justify-content: space-between;
            color: #ccc;
            font-size: 12px;
            margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }

        /* 加载指示器 */
        .loading-spinner {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.15);
            border-top-color: rgba(255,255,255,0.9);
            animation: spin 1s linear infinite;
            z-index: 1002;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .container { padding: 0 10px; }
            .close-button { top: -32px; font-size: 28px; }
            .iframe-wrapper { height: min(92vh, calc(100vw * 9 / 16)); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>u盘使用说明书</h1>
    </div>
    <div id="list-container">
        <!-- Items will be generated by JavaScript -->
    </div>
    <a href="https://pan.quark.cn/s/825b809d7793" class="button-link" target="_blank">
        以上视频高速播放 (加载慢、卡顿点这个)
    </a>
</div>

<div id="videoModal" class="video-modal">
    <div class="video-modal-content">
        <span id="closeButton" class="close-button">&times;</span>
        <span id="openButton" class="close-button" style="right:48px; font-size:14px; padding:6px 8px;">在新窗口打开</span>
        <div id="loadingSpinner" class="loading-spinner" style="display:none;"></div>
        <video id="videoPlayer" playsinline webkit-playsinline preload="none" style="display:none;"></video>
        <img id="imageViewer" style="display:none;" />
        <div id="iframeContainer" style="display:none;"></div>
        <div id="progressWrap" class="video-progress-wrap" style="display:none;">
            <div id="progressBar" class="video-progress-bar">
                <div id="progressBuffered" class="video-progress-buffered"></div>
                <div id="progressFilled" class="video-progress-filled"></div>
                <div id="progressThumb" class="video-progress-thumb"></div>
            </div>
            <div class="video-time">
                <span id="timeCurrent">0:00</span>
                <span id="timeTotal">0:00</span>
            </div>
        </div>
    </div>
</div>

<script>
    const BILIBILI_EMBED = "//player.bilibili.com/player.html?isOutside=true&aid=116198343712041&bvid=BV1a3PXz8EQC&cid=36574922624&p=1";
    const items = [
        { title: "U盘常用-问题解答", file: "videos/1.U盘常用-问题解答.jpg", type: "image" },
        { title: "U盘容量-问题解答", file: "videos/2.U盘容量-问题解答.jpg", type: "image" },
        { title: "【OPPO/VIVO】手机使用方法", file: "videos/3.【OPPO VIVO】手机使用方法.jpg", type: "image" },
        { title: "【华为/小米】手机使用方法", file: "videos/4.【华为 小米】手机使用方法.jpg", type: "image" },
        { title: "【OPPO/VIVO】看了视频还是不会操作", file: "videos/5.【OPPO VIVO】看了视频还是不会操作.jpg", type: "image" },
        { title: "【华为/小米】看了视频还是不会操作", file: "videos/6.【华为 小米】看了视频还是不会操作.jpg", type: "image" },
        { title: "【视频】VIVO手机-操作教程 (B站嵌入示例)", embed: BILIBILI_EMBED, type: "video" },
        { title: "【视频】OPPO手机-操作教程 (B站嵌入示例)", embed: BILIBILI_EMBED, type: "video" },
        { title: "【视频】小米手机-操作教程 (B站嵌入示例)", embed: BILIBILI_EMBED, type: "video" },
        { title: "【视频】华为手机-操作教程 (B站嵌入示例)", embed: BILIBILI_EMBED, type: "video" },
        { title: "【视频】三星手机-操作教程 (B站嵌入示例)", embed: BILIBILI_EMBED, type: "video" },
        { title: "【视频】安卓下载歌曲到U盘 (B站嵌入示例)", embed: "//player.bilibili.com/player.html?isOutside=true&aid=379946535&bvid=BV1PZ4y1X7KZ&cid=464585052&p=1", type: "video" },
        { title: "苹果15-16-17使用教程【视频讲解】 (B站嵌入示例)", embed: "//player.bilibili.com/player.html?isOutside=true&aid=379946535&bvid=BV1PZ4y1X7KZ&cid=464585052&p=1", type: "video" },
        { title: "苹果转接头使用方法 (B站嵌入示例)", embed: BILIBILI_EMBED, type: "video" }
    ];

    const listContainer = document.getElementById('list-container');
    const videoModal = document.getElementById('videoModal');
    const videoPlayer = document.getElementById('videoPlayer');
    const imageViewer = document.getElementById('imageViewer');
    const iframeContainer = document.getElementById('iframeContainer');
    const closeButton = document.getElementById('closeButton');
    const openButton = document.getElementById('openButton');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const progressBuffered = document.getElementById('progressBuffered');
    const progressThumb = document.getElementById('progressThumb');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');

    function formatTime(sec) {
        if (isNaN(sec) || sec < 0) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    // 列表渲染
    items.forEach((item) => {
        const listItem = document.createElement('div');
        listItem.classList.add('list-item');

        const text = document.createElement('div');
        text.classList.add('text');
        text.textContent = item.title;
        listItem.appendChild(text);
        listContainer.appendChild(listItem);

        listItem.addEventListener('click', () => {
            if (item.type === 'video' && !item.embed) {
                // 延迟加载：只有点击才设置 src 和 controls (本地视频)
                imageViewer.style.display = 'none';
                iframeContainer.style.display = 'none';
                iframeContainer.innerHTML = '';
                videoPlayer.style.display = 'block';
                progressWrap.style.display = 'block';
                loadingSpinner.style.display = 'block';
                // 显示控件
                videoPlayer.controls = true;
                // 设置 src 并开始加载/播放
                videoPlayer.src = item.file;
                videoPlayer.load();
                videoPlayer.play().catch(() => {});
            } else if (item.embed) {
                // B 站或第三方 iframe 嵌入
                imageViewer.style.display = 'none';
                videoPlayer.style.display = 'none';
                videoPlayer.pause();
                videoPlayer.removeAttribute('src');
                videoPlayer.load();
                progressWrap.style.display = 'none';
                loadingSpinner.style.display = 'none';
                // 创建 iframe（放入自适应 wrapper，保持 16:9 并受 max-height 限制）
                iframeContainer.innerHTML = '';
                const wrapper = document.createElement('div');
                wrapper.className = 'iframe-wrapper';
                const iframe = document.createElement('iframe');
                // 强制使用 https 协议，添加播放权限和引用策略
                const src = item.embed.startsWith('//') ? ('https:' + item.embed) : item.embed;
                iframe.src = src;
                iframe.className = 'video-iframe';
                iframe.setAttribute('allowfullscreen', 'true');
                iframe.setAttribute('webkitallowfullscreen', 'true');
                iframe.setAttribute('mozallowfullscreen', 'true');
                iframe.setAttribute('scrolling', 'no');
                iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
                iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
                wrapper.appendChild(iframe);
                iframeContainer.appendChild(wrapper);
                // 在无法进入 iframe 全屏时，提供在新窗口/标签页打开的回退方案
                if (openButton) {
                    openButton.style.display = 'block';
                    openButton.onclick = function (ev) {
                        ev.stopPropagation();
                        try {
                            window.open(src, '_blank', 'noopener');
                        } catch (e) {
                            // fallback: 设置 location
                            location.href = src;
                        }
                    };
                }
                // 立即设置自适应高度
                function calcIframeHeight() {
                    const vw = Math.max(document.documentElement.clientWidth || 0, window.innerWidth || 0);
                    const vh = Math.max(document.documentElement.clientHeight || 0, window.innerHeight || 0);
                    // 计算基于宽度的 16:9 高度
                    const hFromWidth = vw * 9 / 16;
                    // 限制为视口高度的一定比例，防止溢出
                    const maxH = vh * 0.92;
                    return Math.min(hFromWidth, maxH);
                }
                wrapper.style.height = calcIframeHeight() + 'px';
                iframeContainer.style.display = 'block';
                    // 保存当前活跃媒体元素容器以便全屏切换使用
                    activeMediaWrapper = wrapper;
                // 监听尺寸变化，确保横竖屏切换时自适应
                function updateIframeWrapperHeight() {
                    try {
                        const wrappers = iframeContainer.querySelectorAll('.iframe-wrapper');
                        wrappers.forEach(w => {
                            w.style.height = calcIframeHeight() + 'px';
                        });
                    } catch (e) {}
                }
                window.addEventListener('resize', updateIframeWrapperHeight);
                window.addEventListener('orientationchange', updateIframeWrapperHeight);
            } else {
                videoPlayer.style.display = 'none';
                videoPlayer.pause();
                progressWrap.style.display = 'none';
                imageViewer.style.display = 'block';
                imageViewer.src = item.file;
            }
            videoModal.style.display = 'flex';
        });
    });

    // 关闭弹窗
    function closeModal() {
        videoModal.style.display = 'none';
        videoPlayer.pause();
        ensureExitFullscreen();
        // 移除 src，避免继续下载
        try { videoPlayer.removeAttribute('src'); } catch(e) {}
        videoPlayer.load();
        videoPlayer.style.display = 'none';
        videoPlayer.controls = false;
        imageViewer.style.display = 'none';
        progressWrap.style.display = 'none';
        loadingSpinner.style.display = 'none';
        if (openButton) openButton.style.display = 'none';
        // 清理 iframe
        try { iframeContainer.innerHTML = ''; iframeContainer.style.display = 'none'; } catch (e) {}
        progressFilled.style.width = '0%';
        progressThumb.style.left = '0%';
        progressBuffered.style.width = '0%';
        timeCurrent.textContent = '0:00';
        timeTotal.textContent = '0:00';
    }

    // 全屏处理：支持标准 API 与厂商前缀
    function enterFullscreen(el) {
        if (!el) return;
        if (el.requestFullscreen) return el.requestFullscreen();
        if (el.webkitRequestFullscreen) return el.webkitRequestFullscreen();
        if (el.mozRequestFullScreen) return el.mozRequestFullScreen();
        if (el.msRequestFullscreen) return el.msRequestFullscreen();
    }
    function exitFullscreen() {
        if (document.exitFullscreen) return document.exitFullscreen();
        if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
        if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
        if (document.msExitFullscreen) return document.msExitFullscreen();
    }

    // 使用 iframe 内置控件进行全屏（不使用自定义全屏按钮）
    let activeMediaWrapper = null;

    // 当关闭弹窗或点击遮罩时，退出全屏（若在全屏）
    function ensureExitFullscreen() {
        if (document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement) {
            exitFullscreen();
        }
    }

    closeButton.addEventListener('click', closeModal);
    videoModal.addEventListener('click', (e) => {
        if (e.target === videoModal) closeModal();
    });

    // 视频播放时更新进度条
    videoPlayer.addEventListener('timeupdate', () => {
        if (!videoPlayer.duration) return;
        const pct = (videoPlayer.currentTime / videoPlayer.duration) * 100;
        progressFilled.style.width = pct + '%';
        progressThumb.style.left = pct + '%';
        timeCurrent.textContent = formatTime(videoPlayer.currentTime);
    });

    videoPlayer.addEventListener('loadedmetadata', () => {
        timeTotal.textContent = formatTime(videoPlayer.duration);
    });

    // 缓冲进度
    videoPlayer.addEventListener('progress', () => {
        if (videoPlayer.buffered.length > 0 && videoPlayer.duration) {
            const buffEnd = videoPlayer.buffered.end(videoPlayer.buffered.length - 1);
            progressBuffered.style.width = (buffEnd / videoPlayer.duration) * 100 + '%';
        }
    });

    // 显示/隐藏加载指示器
    videoPlayer.addEventListener('canplay', () => { loadingSpinner.style.display = 'none'; });
    videoPlayer.addEventListener('playing', () => { loadingSpinner.style.display = 'none'; });
    videoPlayer.addEventListener('waiting', () => { loadingSpinner.style.display = 'block'; });
    videoPlayer.addEventListener('stalled', () => { loadingSpinner.style.display = 'block'; });
    videoPlayer.addEventListener('error', () => { loadingSpinner.style.display = 'none'; });

    // 点击/拖拽进度条跳转（支持鼠标和触摸）
    let dragging = false;

    function seekTo(e) {
        const rect = progressBar.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let pct = (clientX - rect.left) / rect.width;
        pct = Math.max(0, Math.min(1, pct));
        if (videoPlayer.duration) {
            videoPlayer.currentTime = pct * videoPlayer.duration;
        }
    }

    progressBar.addEventListener('mousedown', (e) => { dragging = true; seekTo(e); });
    document.addEventListener('mousemove', (e) => { if (dragging) seekTo(e); });
    document.addEventListener('mouseup', () => { dragging = false; });

    progressBar.addEventListener('touchstart', (e) => { dragging = true; seekTo(e); }, { passive: true });
    document.addEventListener('touchmove', (e) => { if (dragging) seekTo(e); }, { passive: true });
    document.addEventListener('touchend', () => { dragging = false; });

    // 点击视频本身切换播放/暂停
    videoPlayer.addEventListener('click', () => {
        if (videoPlayer.paused) {
            videoPlayer.play();
        } else {
            videoPlayer.pause();
        }
    });
</script>

</body>
</html>
